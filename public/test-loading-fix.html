<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeScreen Loading Fix Test</title>
    <link rel="stylesheet" href="styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
    <div id="root"></div>

    <script src="cryptoTree.js"></script>
    <!-- Load the minimal fixed version -->
    <script src="TreeScreen-minimal-fixed.js"></script>
    
    <script>
        console.log('🔧 Testing TreeScreen Loading Fix');
        
        const mockBookmarksApi = {
            isBookmarked: () => false,
            toggleBookmark: () => {}
        };
        
        const mockOpenArticle = () => {};
        
        // Test loading
        const testLoading = () => {
            console.log('📋 Checking prerequisites...');
            
            // Check React
            if (!window.React) {
                console.error('❌ React not loaded');
                return false;
            }
            console.log('✅ React loaded');
            
            // Check tree data
            if (!window.cryptoTree) {
                console.error('❌ cryptoTree not loaded');
                return false;
            }
            console.log('✅ cryptoTree loaded');
            
            // Check TreeScreen component
            if (!window.TreeScreen) {
                console.error('❌ TreeScreen not loaded');
                return false;
            }
            console.log('✅ TreeScreen component loaded');
            
            return true;
        };
        
        // Test rendering
        const testRendering = () => {
            try {
                console.log('🎨 Testing component rendering...');
                
                const element = React.createElement(window.TreeScreen, {
                    tree: window.cryptoTree,
                    onOpenArticle: mockOpenArticle,
                    bookmarksApi: mockBookmarksApi
                });
                
                ReactDOM.render(element, document.getElementById('root'));
                console.log('✅ Component rendered successfully');
                
                // Check if tiles are rendered
                setTimeout(() => {
                    const tiles = document.querySelectorAll('.tree-section-tile');
                    console.log(`🎯 Found ${tiles.length} tree tiles`);
                    
                    if (tiles.length > 0) {
                        console.log('✅ Tree tiles rendered successfully');
                        showSuccess(`TreeScreen loaded! Found ${tiles.length} tiles.`);
                        
                        // Test basic interaction
                        const firstTile = tiles[0];
                        if (firstTile) {
                            firstTile.click();
                            console.log('✅ Tile interaction working');
                        }
                    } else {
                        console.log('⚠️ No tiles found - check tree data');
                        showWarning('TreeScreen loaded but no tiles found');
                    }
                }, 1000);
                
                return true;
            } catch (error) {
                console.error('❌ Rendering failed:', error);
                showError('Rendering failed: ' + error.message);
                return false;
            }
        };
        
        const showSuccess = (message) => {
            const div = document.createElement('div');
            div.innerHTML = `
                <div style="
                    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                    background: #10b981; color: white; padding: 1.5rem 2rem;
                    border-radius: 12px; z-index: 10000; font-weight: 600;
                    box-shadow: 0 8px 30px rgba(16, 185, 129, 0.3);
                ">
                    ✅ ${message}
                </div>
            `;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        };
        
        const showWarning = (message) => {
            const div = document.createElement('div');
            div.innerHTML = `
                <div style="
                    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                    background: #f59e0b; color: white; padding: 1.5rem 2rem;
                    border-radius: 12px; z-index: 10000; font-weight: 600;
                    box-shadow: 0 8px 30px rgba(245, 158, 11, 0.3);
                ">
                    ⚠️ ${message}
                </div>
            `;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        };
        
        const showError = (message) => {
            const div = document.createElement('div');
            div.innerHTML = `
                <div style="
                    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                    background: #ef4444; color: white; padding: 1.5rem 2rem;
                    border-radius: 12px; z-index: 10000; font-weight: 600;
                    box-shadow: 0 8px 30px rgba(239, 68, 68, 0.3);
                ">
                    ❌ ${message}
                </div>
            `;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        };
        
        // Run tests
        if (testLoading()) {
            testRendering();
        } else {
            showError('Prerequisites not met - check console for details');
        }
        
        // Add debug info
        setTimeout(() => {
            const debugInfo = document.createElement('div');
            debugInfo.innerHTML = `
                <div style="
                    position: fixed; bottom: 20px; right: 20px;
                    background: rgba(15, 23, 42, 0.95); border: 1px solid #3b82f6;
                    border-radius: 8px; padding: 1rem; color: #f7f9ff;
                    max-width: 300px; z-index: 9999; font-size: 0.9rem;
                ">
                    <h3 style="margin: 0 0 0.5rem 0; color: #3b82f6;">🔧 Debug Info</h3>
                    <div>React: ${window.React ? '✅' : '❌'}</div>
                    <div>Tree Data: ${window.cryptoTree ? '✅' : '❌'}</div>
                    <div>TreeScreen: ${window.TreeScreen ? '✅' : '❌'}</div>
                    <div>Tiles: ${document.querySelectorAll('.tree-section-tile').length}</div>
                    <button onclick="this.parentElement.remove()" style="
                        margin-top: 0.5rem; padding: 0.25rem 0.5rem;
                        background: #3b82f6; border: none; border-radius: 4px;
                        color: white; cursor: pointer;
                    ">Close</button>
                </div>
            `;
            document.body.appendChild(debugInfo);
        }, 2000);
    </script>
</body>
</html>
