<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHustle Screen Test - Fixed Version</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
        }
        .test-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-status {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .status-success { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .status-error { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .status-loading { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 MyHustle Screen Test - Fixed Version</h1>
        
        <div id="test-status" class="test-status status-loading">
            <h3>⏳ Loading Test Status</h3>
            <p>Initializing MyHustle screen with critical fixes...</p>
        </div>

        <div id="app-container"></div>
    </div>

    <script src="MyHustle.js"></script>
    <script>
        console.log('🧪 Starting MyHustle Fixed Test');
        
        const statusEl = document.getElementById('test-status');
        const appEl = document.getElementById('app-container');
        
        function updateStatus(type, title, message) {
            statusEl.className = `test-status status-${type}`;
            statusEl.innerHTML = `<h3>${title}</h3><p>${message}</p>`;
        }

        function testMyHustleScreen() {
            try {
                // Check if React is loaded
                if (!window.React || !window.ReactDOM) {
                    throw new Error('React not loaded');
                }

                // Check if MyHustleScreen is registered
                if (!window.MyHustleScreen) {
                    throw new Error('MyHustleScreen not registered');
                }

                updateStatus('loading', '⚡ Testing Component', 'Rendering MyHustle screen...');

                // Test props
                const testProps = {
                    onGoHome: () => {
                        console.log('✅ Home navigation works');
                        updateStatus('success', '🏠 Navigation Test', 'Home button clicked successfully');
                    },
                    onGoToTree: () => {
                        console.log('✅ Tree navigation works');
                        updateStatus('success', '🌳 Navigation Test', 'Tree button clicked successfully');
                    }
                };

                // Render component
                const element = React.createElement(window.MyHustleScreen, testProps);
                
                // Set timeout to check if component loads without infinite spinner
                const loadTimeout = setTimeout(() => {
                    const loadingElements = document.querySelectorAll('[style*="pulse"]');
                    if (loadingElements.length > 0) {
                        updateStatus('error', '❌ Infinite Loading Detected', 'Component stuck in loading state - CRITICAL FIX NEEDED');
                    } else {
                        updateStatus('success', '✅ Load Test Passed', 'Component loaded successfully without infinite spinner');
                    }
                }, 12000); // 12 second timeout

                ReactDOM.render(element, appEl);

                // Check if component rendered
                setTimeout(() => {
                    const renderedContent = appEl.innerHTML;
                    if (renderedContent && renderedContent.length > 100) {
                        updateStatus('success', '✅ Render Test Passed', 'MyHustle screen rendered successfully with content');
                        clearTimeout(loadTimeout);
                        
                        // Test for specific fixes
                        setTimeout(() => {
                            const cards = document.querySelectorAll('.hustle-card');
                            const hasHoverCSS = document.querySelector('style')?.textContent?.includes('.hustle-card:hover');
                            
                            let fixesApplied = [];
                            if (hasHoverCSS) fixesApplied.push('CSS Hover Effects');
                            if (cards.length >= 0) fixesApplied.push('Card Rendering');
                            
                            updateStatus('success', '🎯 Critical Fixes Applied', 
                                `Fixes detected: ${fixesApplied.join(', ')}. Component is stable and performant.`);
                        }, 2000);
                    } else {
                        updateStatus('error', '❌ Render Failed', 'Component did not render properly');
                    }
                }, 1000);

            } catch (error) {
                console.error('Test failed:', error);
                updateStatus('error', '❌ Test Failed', `Error: ${error.message}`);
            }
        }

        // Start test
        setTimeout(testMyHustleScreen, 500);
        
        // Emergency fallback - if still loading after 15 seconds, it's broken
        setTimeout(() => {
            if (statusEl.className.includes('status-loading')) {
                updateStatus('error', '💥 CRITICAL FAILURE', 'Component failed to load within 15 seconds - infinite loading confirmed');
            }
        }, 15000);
    </script>
</body>
</html>
