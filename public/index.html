      // Wait for React to load before initializing auth

    <script type="module">
      try {
        const mod = await import('https://esm.sh/siwe@2.1.4');

    <!-- Test SIWE library loading -->
    <script>
      (function testSiweWhenReady() {
        const startedAt = Date.now();
        const timeoutMs = 3000;
        const intervalMs = 200;

        function check() {
          if (typeof window.SiweMessage !== 'undefined') {
            console.log('Testing SIWE library availability...');
            console.log('window.SiweMessage:', typeof window.SiweMessage);
            console.log('✅ SIWE library loaded successfully');
            try {
              const testMessage = new window.SiweMessage({
                domain: 'test.com',
                address: '0x1234567890123456789012345678901234567890',
                statement: 'Test message',
                uri: 'https://test.com',
                version: '1',
                chainId: 1,
                nonce: '12345678'
              });
              console.log('✅ SIWE Message creation test passed');
            } catch (e) {
              console.error('❌ SIWE Message creation test failed:', e);
            }
            return;
          }

          if (Date.now() - startedAt >= timeoutMs) {
            console.warn('⚠️ SIWE library not found (wallet SIWE auth will be unavailable until it loads)');
            console.log('Continuing without SIWE support...');
            return;
          }

          setTimeout(check, intervalMs);
        }

        check();
      })();
      
      // Test wallet availability
      console.log('=== WALLET DETECTION ===');
      console.log('window.ethereum:', !!window.ethereum);
      console.log('window.ethereum?.isMetaMask:', !!window.ethereum?.isMetaMask);
      console.log('window.ethereum?.isTrust:', !!window.ethereum?.isTrust);
      console.log('window.trustwallet:', !!window.trustwallet);
      console.log('window.trustwallet?.isTrust:', !!window.trustwallet?.isTrust);
      console.log('window.trustWallet:', !!window.trustWallet);
      console.log('window.trustWallet?.isTrust:', !!window.trustWallet?.isTrust);
      console.log('window.trust:', !!window.trust);
      console.log('window.trust?.isTrust:', !!window.trust?.isTrust);
      console.log('window.solana:', !!window.solana);
      console.log('window.solana?.isPhantom:', !!window.solana?.isPhantom);
      
      // Log Trust Wallet provider details
      if (window.trustwallet) {
        console.log('window.trustwallet details:', {
          isTrust: window.trustwallet.isTrust,
          request: !!window.trustwallet.request,
          enable: !!window.trustwallet.enable,
          send: !!window.trustwallet.send,
          constructor: window.trustwallet.constructor?.name
        });
      }
      
      if (window.ethereum && window.ethereum.providers) {
        console.log('Available providers:', window.ethereum.providers.map(p => ({
          isMetaMask: !!p.isMetaMask,
          isTrust: !!p.isTrust,
          name: p.constructor?.name || 'Unknown'
        })));
      }
    </script>
