<!DOCTYPE html>
<html>
<head>
  <title>TreeScreen Verification</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e293b; color: #f7f9ff; }
    .pass { color: #10b981; }
    .fail { color: #ef4444; }
  </style>
</head>
<body>
  <h1>TreeScreen Verification Tests</h1>
  <div id="output"></div>
  
  <script src="TreeScreen.js"></script>
  <script src="verify-treescreen.js"></script>
  
  <script>
    const output = document.getElementById('output');
    const originalLog = console.log;
    console.log = function(...args) {
      originalLog.apply(console, args);
      const msg = args.join(' ');
      const div = document.createElement('div');
      div.textContent = msg;
      if (msg.includes('✅') || msg.includes('PASS')) div.className = 'pass';
      if (msg.includes('❌') || msg.includes('FAIL')) div.className = 'fail';
      output.appendChild(div);
    };
  </script>
</body>
</html>
