<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHustle Test - Final</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: #f7f9ff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .test-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
        }
        .test-status {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            margin: 0.5rem;
        }
        .status-loading { background: #f59e0b; color: white; }
        .status-success { background: #10b981; color: white; }
        .status-error { background: #ef4444; color: white; }
        .debug-info {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="test-header">
        <h1>🚀 MyHustle Screen Test - Final Version</h1>
        <div id="test-status" class="test-status status-loading">Loading...</div>
        <div id="debug-info" class="debug-info"></div>
    </div>

    <div id="root"></div>

    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Load MyHustle Component -->
    <script src="MyHustle.js"></script>

    <script>
        // Test runner
        let testStartTime = Date.now();
        let componentLoadTime = null;
        let renderTime = null;

        function updateStatus(status, message) {
            const statusEl = document.getElementById('test-status');
            statusEl.className = `test-status status-${status}`;
            statusEl.textContent = message;
        }

        function updateDebugInfo() {
            const debugEl = document.getElementById('debug-info');
            const now = Date.now();
            const elapsed = now - testStartTime;
            
            debugEl.innerHTML = `
                <strong>Test Debug Info:</strong><br>
                • Test Started: ${new Date(testStartTime).toLocaleTimeString()}<br>
                • Elapsed Time: ${elapsed}ms<br>
                • React Available: ${typeof React !== 'undefined'}<br>
                • ReactDOM Available: ${typeof ReactDOM !== 'undefined'}<br>
                • MyHustleScreen Type: ${typeof window.MyHustleScreen}<br>
                • Component Load Time: ${componentLoadTime ? (componentLoadTime - testStartTime) + 'ms' : 'pending'}<br>
                • Render Time: ${renderTime ? (renderTime - testStartTime) + 'ms' : 'pending'}<br>
                • Connection Test: <span id="connection-test">Testing...</span>
            `;
        }

        // Test network connectivity
        function testConnection() {
            fetch('https://httpbin.org/get', { 
                method: 'GET',
                mode: 'cors',
                signal: AbortSignal.timeout(5000)
            })
            .then(response => {
                document.getElementById('connection-test').innerHTML = 
                    '<span style="color: #10b981;">✅ Network OK</span>';
            })
            .catch(error => {
                document.getElementById('connection-test').innerHTML = 
                    '<span style="color: #f59e0b;">⚠️ Network Limited</span>';
            });
        }

        // Wait for component to load
        function waitForComponent() {
            if (typeof window.MyHustleScreen === 'function') {
                componentLoadTime = Date.now();
                updateStatus('success', 'Component Loaded Successfully');
                renderComponent();
            } else if (Date.now() - testStartTime > 10000) {
                updateStatus('error', 'Component Load Timeout');
            } else {
                setTimeout(waitForComponent, 100);
            }
            updateDebugInfo();
        }

        function renderComponent() {
            try {
                const { createElement } = React;
                const { createRoot } = ReactDOM;

                const testProps = {
                    onGoHome: () => console.log('Go Home clicked'),
                    onGoToTree: () => console.log('Go To Tree clicked')
                };

                const root = createRoot(document.getElementById('root'));
                root.render(createElement(window.MyHustleScreen, testProps));
                
                renderTime = Date.now();
                updateStatus('success', `✅ Rendered Successfully (${renderTime - testStartTime}ms)`);
                
                // Test for infinite loading after 15 seconds
                setTimeout(() => {
                    const loadingElements = document.querySelectorAll('[style*="pulse"]');
                    if (loadingElements.length > 0) {
                        updateStatus('error', '❌ Infinite Loading Detected');
                    } else {
                        updateStatus('success', '✅ No Infinite Loading - Test Passed');
                    }
                }, 15000);

            } catch (error) {
                console.error('Render error:', error);
                updateStatus('error', `Render Error: ${error.message}`);
            }
            updateDebugInfo();
        }

        // Start test
        updateStatus('loading', 'Initializing Test...');
        updateDebugInfo();
        testConnection();
        
        // Wait for DOM and scripts to load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', waitForComponent);
        } else {
            setTimeout(waitForComponent, 500);
        }

        // Auto-refresh debug info
        setInterval(updateDebugInfo, 2000);
    </script>
</body>
</html>
