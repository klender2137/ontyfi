<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Drift Fix Test</title>
    <link rel="stylesheet" href="styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- Load tree data -->
    <script src="cryptoTree.js"></script>
    <!-- Load TreeScreen component -->
    <script src="TreeScreen.js"></script>
    
    <script>
        console.log('🎯 Testing Zoom Drift Fix');
        
        // Mock APIs
        const mockBookmarksApi = {
            isBookmarked: (id) => false,
            toggleBookmark: (node) => console.log('Toggle bookmark:', node.name)
        };
        
        const mockOpenArticle = (node) => {
            console.log('Open article:', node.name);
        };
        
        // Test zoom stability
        const testZoomStability = () => {
            console.log('🔍 Testing zoom stability...');
            
            setTimeout(() => {
                const treeContainer = document.querySelector('.tree-space');
                const containerParent = treeContainer?.parentElement;
                
                if (!treeContainer || !containerParent) {
                    console.log('❌ Tree container not found');
                    return;
                }\n                \n                // Get initial tile positions\n                const tiles = document.querySelectorAll('.tree-section-tile');\n                if (tiles.length === 0) {\n                    console.log('❌ No tiles found');\n                    return;\n                }\n                \n                // Pick a tile in the center of the screen\n                const centerTile = Array.from(tiles).find(tile => {\n                    const rect = tile.getBoundingClientRect();\n                    const centerX = window.innerWidth / 2;\n                    const centerY = window.innerHeight / 2;\n                    return Math.abs(rect.left + rect.width/2 - centerX) < 100 &&\n                           Math.abs(rect.top + rect.height/2 - centerY) < 100;\n                });\n                \n                if (!centerTile) {\n                    console.log('❌ No center tile found for testing');\n                    return;\n                }\n                \n                const initialRect = centerTile.getBoundingClientRect();\n                const initialCenterX = initialRect.left + initialRect.width / 2;\n                const initialCenterY = initialRect.top + initialRect.height / 2;\n                \n                console.log('📍 Initial tile center:', { x: initialCenterX, y: initialCenterY });\n                \n                // Simulate zoom out at the tile center\n                const zoomOutEvent = new WheelEvent('wheel', {\n                    deltaY: 500, // Zoom out\n                    clientX: initialCenterX,\n                    clientY: initialCenterY,\n                    bubbles: true\n                });\n                \n                containerParent.dispatchEvent(zoomOutEvent);\n                \n                setTimeout(() => {\n                    const newRect = centerTile.getBoundingClientRect();\n                    const newCenterX = newRect.left + newRect.width / 2;\n                    const newCenterY = newRect.top + newRect.height / 2;\n                    \n                    console.log('📍 New tile center:', { x: newCenterX, y: newCenterY });\n                    \n                    const driftX = Math.abs(newCenterX - initialCenterX);\n                    const driftY = Math.abs(newCenterY - initialCenterY);\n                    \n                    console.log('📏 Drift distance:', { x: driftX, y: driftY });\n                    \n                    // Allow small drift due to zoom scaling, but not major camera movement\n                    if (driftX < 50 && driftY < 50) {\n                        console.log('✅ Zoom drift fix working - minimal camera movement');\n                        showSuccessMessage('Zoom drift fixed! Camera stays stable.');\n                    } else {\n                        console.log('❌ Zoom drift still present - camera moved significantly');\n                        showErrorMessage(`Camera drifted ${Math.round(driftX)}px horizontally, ${Math.round(driftY)}px vertically`);\n                    }\n                }, 100);\n                \n            }, 3000);\n        };\n        \n        // Test multiple zoom operations\n        const testMultipleZooms = () => {\n            console.log('🔄 Testing multiple zoom operations...');\n            \n            setTimeout(() => {\n                const containerParent = document.querySelector('.tree-space')?.parentElement;\n                if (!containerParent) return;\n                \n                const centerX = window.innerWidth / 2;\n                const centerY = window.innerHeight / 2;\n                \n                // Zoom in and out multiple times\n                const zoomSequence = [\n                    { deltaY: -300, delay: 0 },    // Zoom in\n                    { deltaY: -300, delay: 200 },  // Zoom in more\n                    { deltaY: 600, delay: 400 },   // Zoom out\n                    { deltaY: 300, delay: 600 },   // Zoom out more\n                    { deltaY: -200, delay: 800 }   // Zoom back in\n                ];\n                \n                zoomSequence.forEach(({ deltaY, delay }) => {\n                    setTimeout(() => {\n                        const event = new WheelEvent('wheel', {\n                            deltaY,\n                            clientX: centerX,\n                            clientY: centerY,\n                            bubbles: true\n                        });\n                        containerParent.dispatchEvent(event);\n                    }, delay);\n                });\n                \n                setTimeout(() => {\n                    console.log('✅ Multiple zoom operations completed');\n                }, 1200);\n                \n            }, 5000);\n        };\n        \n        // Show success/error messages\n        const showSuccessMessage = (message) => {\n            const div = document.createElement('div');\n            div.innerHTML = `\n                <div style=\"\n                    position: fixed;\n                    top: 50%;\n                    left: 50%;\n                    transform: translate(-50%, -50%);\n                    background: #10b981;\n                    color: white;\n                    padding: 1rem 2rem;\n                    border-radius: 8px;\n                    z-index: 10000;\n                    font-weight: 600;\n                \">\n                    ✅ ${message}\n                </div>\n            `;\n            document.body.appendChild(div);\n            setTimeout(() => div.remove(), 3000);\n        };\n        \n        const showErrorMessage = (message) => {\n            const div = document.createElement('div');\n            div.innerHTML = `\n                <div style=\"\n                    position: fixed;\n                    top: 50%;\n                    left: 50%;\n                    transform: translate(-50%, -50%);\n                    background: #ef4444;\n                    color: white;\n                    padding: 1rem 2rem;\n                    border-radius: 8px;\n                    z-index: 10000;\n                    font-weight: 600;\n                \">\n                    ❌ ${message}\n                </div>\n            `;\n            document.body.appendChild(div);\n            setTimeout(() => div.remove(), 4000);\n        };\n        \n        // Render the component\n        try {\n            if (!window.cryptoTree) {\n                throw new Error('cryptoTree data not loaded');\n            }\n            \n            if (!window.TreeScreen) {\n                throw new Error('TreeScreen component not loaded');\n            }\n            \n            const element = React.createElement(window.TreeScreen, {\n                tree: window.cryptoTree,\n                onOpenArticle: mockOpenArticle,\n                bookmarksApi: mockBookmarksApi\n            });\n            \n            ReactDOM.render(element, document.getElementById('root'));\n            console.log('✅ TreeScreen rendered for zoom drift testing');\n            \n            // Run tests\n            testZoomStability();\n            testMultipleZooms();\n            \n        } catch (error) {\n            console.error('❌ Error rendering TreeScreen:', error);\n            showErrorMessage('Failed to render TreeScreen: ' + error.message);\n        }\n        \n        // Add manual test instructions\n        setTimeout(() => {\n            const instructions = document.createElement('div');\n            instructions.innerHTML = `\n                <div style=\"\n                    position: fixed;\n                    bottom: 20px;\n                    right: 20px;\n                    background: rgba(15, 23, 42, 0.95);\n                    border: 1px solid #3b82f6;\n                    border-radius: 8px;\n                    padding: 1rem;\n                    color: #f7f9ff;\n                    font-size: 0.9rem;\n                    max-width: 300px;\n                    z-index: 9999;\n                \">\n                    <h3 style=\"margin: 0 0 0.5rem 0; color: #3b82f6;\">🎯 Manual Zoom Test</h3>\n                    <ol style=\"margin: 0; padding-left: 1.2rem; line-height: 1.4;\">\n                        <li>Find a tree tile in the center</li>\n                        <li>Place cursor over the tile</li>\n                        <li>Zoom out with mouse wheel</li>\n                        <li>Verify tile stays under cursor</li>\n                        <li>Expand some nodes and repeat</li>\n                    </ol>\n                    <button onclick=\"this.parentElement.remove()\" style=\"\n                        margin-top: 0.5rem;\n                        padding: 0.25rem 0.5rem;\n                        background: #3b82f6;\n                        border: none;\n                        border-radius: 4px;\n                        color: white;\n                        cursor: pointer;\n                    \">Close</button>\n                </div>\n            `;\n            document.body.appendChild(instructions);\n        }, 2000);\n    </script>\n</body>\n</html>
