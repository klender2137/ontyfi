<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeScreen Fix Verification</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: #f7f9ff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .status-box {
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 2px solid;
        }
        .status-loading {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }
        .status-success {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        .status-error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        .component-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .component-item {
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
        }
        .component-item.loaded {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        .component-item.missing {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <h1>🔧 TreeScreen Fix Verification</h1>
    
    <div id="main-status" class="status-box status-loading">
        <h2>⏳ Loading Components...</h2>
        <p>Please wait while we verify all components are loaded correctly.</p>
    </div>

    <div class="component-status" id="component-status"></div>

    <div style="margin-top: 2rem;">
        <h3>Console Output:</h3>
        <pre id="console-output"></pre>
    </div>

    <div id="test-area" style="margin-top: 2rem;"></div>

    <!-- Load React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Load dependencies in correct order -->
    <script src="tree-debug.js"></script>
    <script src="cryptoTree.js"></script>
    <script src="tree-loader.js"></script>
    <script src="user.account.js"></script>
    <script src="tree.openspace.js"></script>
    <script src="TreeScreen.js"></script>
    <script src="account.settings.js"></script>
    <script src="contribute.save.js"></script>
    <script src="admin.utils.js"></script>
    <script src="NotesModule.js"></script>
    <script src="LevelUp.js"></script>
    <script src="MyHustle.js"></script>

    <script>
        // Capture console logs
        const logs = [];
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function(...args) {
            logs.push({ type: 'log', message: args.join(' ') });
            originalLog.apply(console, args);
            updateConsoleOutput();
        };

        console.error = function(...args) {
            logs.push({ type: 'error', message: args.join(' ') });
            originalError.apply(console, args);
            updateConsoleOutput();
        };

        console.warn = function(...args) {
            logs.push({ type: 'warn', message: args.join(' ') });
            originalWarn.apply(console, args);
            updateConsoleOutput();
        };

        function updateConsoleOutput() {
            const output = document.getElementById('console-output');
            output.textContent = logs.slice(-20).map(log => 
                `[${log.type.toUpperCase()}] ${log.message}`
            ).join('\n');
        }

        function checkComponent(name, check) {
            const result = check();
            return {
                name,
                loaded: result,
                type: typeof result === 'boolean' ? (result ? 'function' : 'undefined') : typeof result
            };
        }

        function renderComponentStatus(components) {
            const container = document.getElementById('component-status');
            container.innerHTML = components.map(comp => `
                <div class="component-item ${comp.loaded ? 'loaded' : 'missing'}">
                    <div style="font-weight: 600; margin-bottom: 0.5rem;">
                        ${comp.loaded ? '✅' : '❌'} ${comp.name}
                    </div>
                    <div style="font-size: 0.85rem; color: #94a3b8;">
                        Type: ${comp.type}
                    </div>
                </div>
            `).join('');
        }

        function runVerification() {
            console.log('Starting verification...');

            const components = [
                checkComponent('React', () => typeof React !== 'undefined'),
                checkComponent('ReactDOM', () => typeof ReactDOM !== 'undefined'),
                checkComponent('TreeScreen', () => typeof window.TreeScreen !== 'undefined'),
                checkComponent('MyHustleScreen', () => typeof window.MyHustleScreen !== 'undefined'),
                checkComponent('LevelUpScreen', () => typeof window.LevelUpScreen !== 'undefined'),
                checkComponent('UserAccount', () => typeof window.UserAccount !== 'undefined'),
                checkComponent('cryptoHustleTree', () => typeof window.cryptoHustleTree !== 'undefined'),
                checkComponent('AccountSettings', () => typeof window.AccountSettings !== 'undefined'),
                checkComponent('ContributeSave', () => typeof window.ContributeSave !== 'undefined'),
                checkComponent('AdminUtils', () => typeof window.AdminUtils !== 'undefined')
            ];

            renderComponentStatus(components);

            const allLoaded = components.every(c => c.loaded);
            const mainStatus = document.getElementById('main-status');

            if (allLoaded) {
                mainStatus.className = 'status-box status-success';
                mainStatus.innerHTML = `
                    <h2>✅ All Components Loaded Successfully!</h2>
                    <p>All required components are available. The application should work correctly.</p>
                `;

                // Try to render TreeScreen
                testTreeScreen();
            } else {
                const missing = components.filter(c => !c.loaded).map(c => c.name);
                mainStatus.className = 'status-box status-error';
                mainStatus.innerHTML = `
                    <h2>❌ Some Components Failed to Load</h2>
                    <p>Missing components: ${missing.join(', ')}</p>
                    <button onclick="window.location.reload()" class="primary-button" style="margin-top: 1rem;">
                        Retry
                    </button>
                `;
            }
        }

        function testTreeScreen() {
            console.log('Testing TreeScreen render...');
            
            try {
                const testArea = document.getElementById('test-area');
                testArea.innerHTML = '<h3>TreeScreen Test Render:</h3><div id="tree-test-root"></div>';
                
                const { createElement } = React;
                const { createRoot } = ReactDOM;

                // Create minimal tree data
                const testTree = {
                    fields: [
                        {
                            id: 'test-1',
                            name: 'Test Category',
                            description: 'Test description',
                            tags: ['test'],
                            categories: []
                        }
                    ]
                };

                const testBookmarks = {
                    bookmarks: [],
                    toggleBookmark: () => {},
                    isBookmarked: () => false
                };

                const root = createRoot(document.getElementById('tree-test-root'));
                root.render(createElement(window.TreeScreen, {
                    tree: testTree,
                    onOpenArticle: (node) => console.log('Open article:', node),
                    bookmarksApi: testBookmarks
                }));

                console.log('✅ TreeScreen rendered successfully!');
                
                // Check for black screen
                setTimeout(() => {
                    const treeElement = document.querySelector('.screen');
                    if (treeElement) {
                        const bgColor = window.getComputedStyle(treeElement).backgroundColor;
                        console.log('TreeScreen background color:', bgColor);
                        
                        if (bgColor === 'rgba(0, 0, 0, 0)' || bgColor === 'transparent') {
                            console.error('❌ TreeScreen has transparent background!');
                        } else {
                            console.log('✅ TreeScreen has solid background');
                        }
                    }
                }, 1000);

            } catch (error) {
                console.error('❌ TreeScreen render failed:', error);
            }
        }

        // Run verification after all scripts load
        window.addEventListener('load', () => {
            setTimeout(runVerification, 500);
        });
    </script>
</body>
</html>
