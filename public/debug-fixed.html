<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CryptoExplorer - Debug Fixed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <!-- React via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root">
      <div style="padding: 2rem; text-align: center; color: #94a3b8;">
        <h3>Loading CryptoExplorer (Fixed Version)...</h3>
        <p>Please wait while we initialize the application.</p>
        <div id="debug-info" style="margin-top: 1rem; font-size: 0.8rem; color: #64748b;"></div>
      </div>
    </div>

    <!-- Debug info script -->
    <script>
      function updateDebugInfo() {
        const debugDiv = document.getElementById('debug-info');
        if (debugDiv) {
          debugDiv.innerHTML = `
            React: ${typeof React !== 'undefined' ? '✓' : '✗'}<br>
            ReactDOM: ${typeof ReactDOM !== 'undefined' ? '✓' : '✗'}<br>
            Babel: ${typeof Babel !== 'undefined' ? '✓' : '✗'}<br>
            CryptoTree: ${typeof window.cryptoHustleTree !== 'undefined' ? '✓' : '✗'}<br>
            UserAccount: ${typeof UserAccount !== 'undefined' ? '✓' : '✗'}<br>
            TreeScreen: ${typeof window.TreeScreen !== 'undefined' ? '✓' : '✗'}<br>
            MyHustle: ${typeof window.MyHustleScreen !== 'undefined' ? '✓' : '✗'}<br>
            LevelUp: ${typeof window.LevelUpScreen !== 'undefined' ? '✓' : '✗'}
          `;
        }
      }
      
      // Update debug info every 500ms
      setInterval(updateDebugInfo, 500);
      updateDebugInfo();
    </script>

    <!-- Load dependencies in order -->
    <script src="cryptoTree.js"></script>
    <script src="user.account.js"></script>
    <script src="tree.openspace.js"></script>
    <script src="TreeScreen.js"></script>
    <script src="account.settings.js"></script>
    <script src="contribute.save.js"></script>
    <script src="admin.utils.js"></script>
    <script src="NotesModule.js"></script>
    <script src="MyHustle.js"></script>
    <script src="LevelUp.js"></script>
    <!-- Main app must load last -->
    <script type="text/babel" src="main.js"></script>
  </body>
</html>
