<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Visibility Test</title>
    <link rel="stylesheet" href="styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
    <div id="root"></div>

    <script src="cryptoTree.js"></script>
    <script src="TreeScreen.js"></script>
    
    <script>
        console.log('🔗 Testing Links Visibility');
        
        const mockBookmarksApi = {
            isBookmarked: () => false,
            toggleBookmark: () => {}
        };
        
        const mockOpenArticle = () => {};\n        \n        // Test link visibility and stability\n        const testLinksVisibility = () => {\n            setTimeout(() => {\n                console.log('🔍 Testing links visibility...');\n                \n                // Find expandable tiles\n                const expandableTiles = document.querySelectorAll('.tree-section-tile .tree-expand-indicator');\n                if (expandableTiles.length === 0) {\n                    console.log('❌ No expandable tiles found');\n                    return;\n                }\n                \n                // Expand a tile to create connections\n                const firstExpandable = expandableTiles[0].closest('.tree-section-tile');\n                if (firstExpandable) {\n                    console.log('📍 Expanding tile to create connections...');\n                    firstExpandable.click();\n                    \n                    setTimeout(() => {\n                        // Check for SVG connections\n                        const globalSvg = document.querySelector('svg');\n                        const connections = document.querySelectorAll('svg path');\n                        \n                        console.log('🔗 Global SVG found:', !!globalSvg);\n                        console.log('🔗 Connections found:', connections.length);\n                        \n                        if (globalSvg && connections.length > 0) {\n                            console.log('✅ Links are visible');\n                            \n                            // Test zoom stability\n                            const container = document.querySelector('.tree-space')?.parentElement;\n                            if (container) {\n                                const initialTransform = globalSvg.parentElement.style.transform;\n                                console.log('📍 Initial transform:', initialTransform);\n                                \n                                // Zoom in\n                                const zoomEvent = new WheelEvent('wheel', {\n                                    deltaY: -300,\n                                    clientX: window.innerWidth / 2,\n                                    clientY: window.innerHeight / 2,\n                                    bubbles: true\n                                });\n                                \n                                container.dispatchEvent(zoomEvent);\n                                \n                                setTimeout(() => {\n                                    const newTransform = globalSvg.parentElement.style.transform;\n                                    console.log('📍 After zoom transform:', newTransform);\n                                    \n                                    if (newTransform !== initialTransform && connections.length > 0) {\n                                        // Check if connections are still visible\n                                        const visibleConnections = Array.from(connections).filter(path => {\n                                            const rect = path.getBoundingClientRect();\n                                            return rect.width > 0 && rect.height > 0;\n                                        });\n                                        \n                                        if (visibleConnections.length > 0) {\n                                            console.log('✅ Links follow tiles during zoom');\n                                            showSuccess(`Links working! ${visibleConnections.length} connections visible after zoom.`);\n                                        } else {\n                                            console.log('❌ Links disappeared after zoom');\n                                            showError('Links disappeared after zoom operation');\n                                        }\n                                    } else {\n                                        console.log('❌ Zoom not working or no connections');\n                                        showError('Zoom not working properly');\n                                    }\n                                }, 200);\n                            }\n                        } else {\n                            console.log('❌ No links found after expansion');\n                            showError('No SVG connections found after expanding tiles');\n                        }\n                    }, 500);\n                }\n            }, 2000);\n        };\n        \n        // Test copy link functionality\n        const testCopyLinkButtons = () => {\n            setTimeout(() => {\n                console.log('🔗 Testing copy link buttons...');\n                \n                const copyButtons = document.querySelectorAll('.copy-link-btn');\n                console.log('🔗 Copy buttons found:', copyButtons.length);\n                \n                if (copyButtons.length > 0) {\n                    // Check visibility\n                    const visibleButtons = Array.from(copyButtons).filter(btn => {\n                        const style = window.getComputedStyle(btn);\n                        return style.opacity !== '0' && style.visibility !== 'hidden' && style.display !== 'none';\n                    });\n                    \n                    console.log('🔗 Visible copy buttons:', visibleButtons.length);\n                    \n                    if (visibleButtons.length > 0) {\n                        console.log('✅ Copy link buttons are visible');\n                        \n                        // Test click functionality\n                        const testButton = visibleButtons[0];\n                        testButton.click();\n                        \n                        console.log('✅ Copy link button clickable');\n                        showSuccess(`Copy link buttons working! ${visibleButtons.length} buttons visible.`);\n                    } else {\n                        console.log('❌ Copy link buttons are invisible');\n                        showError('Copy link buttons are not visible');\n                    }\n                } else {\n                    console.log('❌ No copy link buttons found');\n                    showError('No copy link buttons found in DOM');\n                }\n            }, 4000);\n        };\n        \n        const showSuccess = (message) => {\n            const div = document.createElement('div');\n            div.innerHTML = `\n                <div style=\"\n                    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);\n                    background: #10b981; color: white; padding: 1.5rem 2rem;\n                    border-radius: 12px; z-index: 10000; font-weight: 600;\n                    box-shadow: 0 8px 30px rgba(16, 185, 129, 0.3);\n                \">\n                    ✅ ${message}\n                </div>\n            `;\n            document.body.appendChild(div);\n            setTimeout(() => div.remove(), 4000);\n        };\n        \n        const showError = (message) => {\n            const div = document.createElement('div');\n            div.innerHTML = `\n                <div style=\"\n                    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);\n                    background: #ef4444; color: white; padding: 1.5rem 2rem;\n                    border-radius: 12px; z-index: 10000; font-weight: 600;\n                    box-shadow: 0 8px 30px rgba(239, 68, 68, 0.3);\n                \">\n                    ❌ ${message}\n                </div>\n            `;\n            document.body.appendChild(div);\n            setTimeout(() => div.remove(), 4000);\n        };\n        \n        // Render component\n        try {\n            const element = React.createElement(window.TreeScreen, {\n                tree: window.cryptoTree,\n                onOpenArticle: mockOpenArticle,\n                bookmarksApi: mockBookmarksApi\n            });\n            \n            ReactDOM.render(element, document.getElementById('root'));\n            console.log('✅ TreeScreen rendered for links test');\n            \n            testLinksVisibility();\n            testCopyLinkButtons();\n            \n        } catch (error) {\n            console.error('❌ Render error:', error);\n            showError('Failed to render: ' + error.message);\n        }\n        \n        // Add test instructions\n        setTimeout(() => {\n            const instructions = document.createElement('div');\n            instructions.innerHTML = `\n                <div style=\"\n                    position: fixed; bottom: 20px; left: 20px;\n                    background: rgba(15, 23, 42, 0.95); border: 1px solid #3b82f6;\n                    border-radius: 8px; padding: 1rem; color: #f7f9ff;\n                    max-width: 350px; z-index: 9999;\n                \">\n                    <h3 style=\"margin: 0 0 0.5rem 0; color: #3b82f6;\">🔗 Links Test</h3>\n                    <ul style=\"margin: 0; padding-left: 1.2rem; line-height: 1.4; font-size: 0.9rem;\">\n                        <li>Expand tiles to see connections</li>\n                        <li>Zoom in/out to test link stability</li>\n                        <li>Look for 🔗 copy link buttons</li>\n                        <li>Verify connections follow tiles</li>\n                    </ul>\n                    <button onclick=\"this.parentElement.remove()\" style=\"\n                        margin-top: 0.5rem; padding: 0.25rem 0.5rem;\n                        background: #3b82f6; border: none; border-radius: 4px;\n                        color: white; cursor: pointer;\n                    \">Close</button>\n                </div>\n            `;\n            document.body.appendChild(instructions);\n        }, 1000);\n    </script>\n</body>\n</html>
