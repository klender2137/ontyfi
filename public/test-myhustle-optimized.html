<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHustle Optimized Test</title>
    <link rel="stylesheet" href="styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- Load the optimized MyHustle component -->
    <script src="MyHustle-simple.js"></script>
    
    <script>
        console.log('🧪 Testing Optimized MyHustle Screen');
        
        // Test component registration
        console.log('MyHustleScreen available:', typeof window.MyHustleScreen);
        
        // Mock navigation functions
        const mockGoHome = () => console.log('Navigate to Home');
        const mockGoToTree = () => console.log('Navigate to Tree');
        
        // Performance monitoring
        const startTime = performance.now();
        let loadTimeout;
        
        // Emergency timeout to detect infinite loading
        loadTimeout = setTimeout(() => {
            console.error('❌ CRITICAL: MyHustle screen took too long to load (>15s)');
            document.body.innerHTML = `
                <div style="padding: 2rem; text-align: center; color: #ef4444;">
                    <h2>❌ LOAD TIMEOUT</h2>
                    <p>MyHustle screen failed to load within 15 seconds</p>
                    <p>This indicates the infinite loading bug is still present</p>
                </div>
            `;
        }, 15000);
        
        // Monitor loading state
        let checkCount = 0;
        const loadingMonitor = setInterval(() => {
            checkCount++;
            const loadingElements = document.querySelectorAll('[style*="pulse"]');
            console.log(`Loading check ${checkCount}: ${loadingElements.length} skeleton elements`);
            
            if (loadingElements.length === 0 && checkCount > 2) {
                const loadTime = performance.now() - startTime;
                console.log(`✅ MyHustle loaded successfully in ${loadTime.toFixed(2)}ms`);
                clearInterval(loadingMonitor);
                clearTimeout(loadTimeout);
                
                // Show success message
                setTimeout(() => {
                    const successDiv = document.createElement('div');
                    successDiv.innerHTML = `
                        <div style="position: fixed; top: 20px; right: 20px; background: #10b981; color: white; padding: 1rem; border-radius: 8px; z-index: 9999;">
                            ✅ MyHustle loaded in ${loadTime.toFixed(0)}ms
                        </div>
                    `;
                    document.body.appendChild(successDiv);
                    
                    setTimeout(() => successDiv.remove(), 3000);
                }, 1000);
            }
        }, 1000);
        
        // Render the component
        try {
            const element = React.createElement(window.MyHustleScreen, {
                onGoHome: mockGoHome,
                onGoToTree: mockGoToTree
            });
            
            ReactDOM.render(element, document.getElementById('root'));
            console.log('✅ MyHustle component rendered successfully');
            
        } catch (error) {
            console.error('❌ Error rendering MyHustle:', error);
            clearTimeout(loadTimeout);
            clearInterval(loadingMonitor);
            
            document.getElementById('root').innerHTML = `
                <div style="padding: 2rem; text-align: center; color: #ef4444;">
                    <h2>❌ RENDER ERROR</h2>
                    <p>Failed to render MyHustle component</p>
                    <pre>${error.message}</pre>
                </div>
            `;
        }
        
        // Test all critical fixes
        setTimeout(() => {
            console.log('🔍 Testing Critical Fixes:');
            console.log('1. Safe fetch function:', typeof safeFetch);
            console.log('2. Helper functions outside component:', typeof getSourceBadgeColor, typeof getAlphaLevelColor);
            console.log('3. Component registration:', typeof window.MyHustleScreen);
            console.log('4. Error boundary:', typeof MyHustleErrorBoundary);
            
            // Test modal functionality
            const cards = document.querySelectorAll('.hustle-card');
            if (cards.length > 0) {
                console.log('✅ Alpha cards rendered:', cards.length);
                
                // Test click functionality
                cards[0].click();
                setTimeout(() => {
                    const modal = document.querySelector('[style*="position: fixed"]');
                    if (modal) {
                        console.log('✅ Modal functionality working');
                        modal.click(); // Close modal
                    }
                }, 500);
            }
        }, 3000);
    </script>
</body>
</html>
